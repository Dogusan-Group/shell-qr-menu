<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell deli2go Menü</title>
    <style>
        :root {
            --soft-red: #c93b32;
            --soft-yellow: #f5cc62;
            --bg-color: #faf8f5;
            --text-dark: #2d2d2d;
            --text-muted: #666666;
            --card-bg: #ffffff;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Modern Cam Efektli Sabit Header */
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
            padding: 18px 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--soft-red);
            margin-bottom: 2px;
        }

        .header p {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px 15px 60px 15px;
        }

        /* Akordeon Kategori Kartı */
        .category-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        /* Kategori Resmi Bölümü */
        .category-image-wrapper {
            width: 100%;
            height: 140px;
            position: relative;
            background-color: #eae6e1;
            /* Resim yüklenene kadar modern gri alan */
            overflow: hidden;
        }

        .category-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Resim yüklenemezse şık görünmesi için */
        .category-img:not([src]),
        .category-img[src=""] {
            opacity: 0;
        }

        /* Tıklanabilir Başlık Alanı */
        .category-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            background: var(--card-bg);
        }

        .category-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Açma/Kapama İkonu */
        .toggle-icon {
            width: 24px;
            height: 24px;
            background: #f5f5f7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-icon svg {
            width: 12px;
            height: 12px;
            fill: var(--text-muted);
        }

        /* İçerik Alanı (Açılır-Kapanır Bölüm) */
        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #fafbfc;
            border-top: 0 solid rgba(0, 0, 0, 0.03);
        }

        .category-products {
            padding: 10px 20px 20px 20px;
        }

        /* Aktif (Açık) Durum CSS Kuralları */
        .category-card.active .toggle-icon {
            transform: rotate(180deg);
            background: #fff0f0;
        }

        .category-card.active .toggle-icon svg {
            fill: var(--soft-red);
        }

        .category-card.active .category-content {
            border-top-width: 1px;
        }

        .category-card.active .category-img {
            transform: scale(1.03);
        }

        /* Modern Ürün Satırları */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-name {
            font-size: 15px;
            font-weight: 500;
            color: #3a3a3a;
            padding-right: 10px;
            flex: 1;
        }

        .item-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--soft-red);
            white-space: nowrap;
            text-align: right;
            min-width: 80px;
        }

        .footer {
            text-align: center;
            padding: 10px 20px 30px 20px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>Shell deli2go</h1>
        <p>Her An Taptaze</p>
    </header>

    <div id="menu-kapsayici" class="container">
    </div>

    <div class="footer">
        Fiyatlarımıza KDV dahildir. Afiyet olsun.
    </div>

    <script>
        fetch('menu.json')
            .then(response => response.json())
            .then(data => {
                const kapsayici = document.getElementById('menu-kapsayici');
                let htmlIcerik = '';

                data.forEach((kategori, index) => {
                    const isFirst = index === 0 ? 'active' : '';
                    // GitHub Pages img klasörü yolu
                    const resimYolu = kategori.kategori_resmi ? `img/${kategori.kategori_resmi}` : '';

                    htmlIcerik += `
                    <div class="category-card ${isFirst}">
                        <div class="category-image-wrapper">
                            <img class="category-img" src="${resimYolu}" alt="${kategori.kategori_adi}" onerror="this.style.opacity='0';">
                        </div>
                        <div class="category-header" onclick="toggleKategori(this)">
                            <div class="category-title">${kategori.kategori_adi}</div>
                            <div class="toggle-icon">
                                <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                            </div>
                        </div>
                        <div class="category-content">
                            <div class="category-products">
                `;

                    kategori.urunler.forEach(urun => {
                        // Eğer fiyat boşsa (Örn: Bazlama ürününde) tire gösterir [cite: 3, 5]
                        const gosterilecekFiyat = (urun.fiyat && urun.fiyat.trim() !== "") ? urun.fiyat : "- ₺";

                        htmlIcerik += `
                        <div class="menu-item">
                            <div class="item-name">${urun.isim}</div>
                            <div class="item-price">${gosterilecekFiyat}</div>
                        </div>
                    `;
                    });

                    htmlIcerik += `</div></div></div>`;
                });
                kapsayici.innerHTML = htmlIcerik;
                ayarlaAcikAkordeonlar();
            })
            .catch(hata => console.error("Hata:", hata));

        function toggleKategori(element) {
            const kart = element.parentElement;
            const icerik = kart.querySelector('.category-content');
            if (kart.classList.contains('active')) {
                icerik.style.maxHeight = null;
                kart.classList.remove('active');
            } else {
                kart.classList.add('active');
                icerik.style.maxHeight = icerik.scrollHeight + "px";
            }
        }

        function ayarlaAcikAkordeonlar() {
            setTimeout(() => {
                document.querySelectorAll('.category-card.active').forEach(kart => {
                    const icerik = kart.querySelector('.category-content');
                    icerik.style.maxHeight = icerik.scrollHeight + "px";
                });
            }, 100);
        }
    </script>
</body>

</html>
